services:
  - type: web
    name: alfred-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MAKE_WEBHOOK_URL
        sync: false
    autoDeploy: true
