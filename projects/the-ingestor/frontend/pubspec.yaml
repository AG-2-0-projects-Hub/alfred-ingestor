name: the_ingestor
description: Alfred Ingestor — property file ingestion dashboard.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6
  http: ^1.2.1
  file_picker: ^8.1.2
  desktop_drop: ^0.4.4
  flutter_dotenv: ^5.1.0
  record: ^5.1.2
  path: ^1.9.0
  mime: ^1.0.6
  flutter_markdown: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
